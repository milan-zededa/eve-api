syntax = "proto3";

package org.lfedge.eve.info;
option go_package  = "github.com/lf-edge/eve-api/go/info";
option java_package = "org.lfedge.eve.info";

import "google/protobuf/timestamp.proto";

// Describes an error that occurred while applying a configuration to the device.
message ErrorInfo {
  string description = 1;              // Human-readable description of the error.
  google.protobuf.Timestamp timestamp = 2;  // Time at which the error occurred.
  Severity severity = 3;               // Severity level of the error.
  repeated DeviceEntity entities = 4;  // Device entities referenced in the description or retry condition.
  string retry_condition = 5;          // Condition under which the operation may be retried.
}

// Severity tells the severity type
enum Severity {
  SEVERITY_UNSPECIFIED = 0; // severity unspecified
  SEVERITY_NOTICE = 1;      // severity notice
  SEVERITY_WARNING = 2;     // severity warning
  SEVERITY_ERROR = 3;       // severity error
}

// DeviceEntity contains the device entity details
message DeviceEntity {
  Entity entity = 1;           // entity type
  string entity_id = 2;        // entity uuid
  string entity_name = 3;      // entity name
}

// Entity contains the entity type
enum Entity {
  // Invalid Device Entity
  ENTITY_UNSPECIFIED = 0;
  // Base OS entity
  ENTITY_BASE_OS = 1;
  // System Adapter Entity
  ENTITY_SYSTEM_ADAPTER = 2;
  // Vault Entity
  ENTITY_VAULT = 3;
  // Attestation Entity
  ENTITY_ATTESTATION = 4;
  // App Instance Entity
  ENTITY_APP_INSTANCE = 5;
  // Port Entity
  ENTITY_PORT = 6;
  // Network Entity
  ENTITY_NETWORK = 7;
  // Network Instance Entity
  ENTITY_NETWORK_INSTANCE = 8;
  // ContentTree Entity
  ENTITY_CONTENT_TREE = 9;
  // Blob Entity
  ENTITY_CONTENT_BLOB = 10;
  // VOLUME Entity
  ENTITY_VOLUME = 11;
}
